<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Main content wrapper */
        .main-content {
            margin-left: 170px;
        }

        /* Typography improvements */
        body {
            line-height: 1.8;
            font-family: Arial, sans-serif;
        }

        /* Tab navigation styling */
        .tabs {
            list-style-type: none;
            padding: 0;
        }
        .tabs li {
            display: inline;
            margin-right: 15px;
            text-transform: uppercase;
            outline: 1px solid transparent;
        }
        .tabs li:hover {
            outline: 1px solid black;
        }

        /* Custom bullet styling for lists */
        ul {
            list-style: none;
        }
        ul li:before {
            content: '\2022'; /* bullet character */
            color: blue; /* custom bullet color */
            font-size: 1.5em; /* bullet size */
            margin-right: 10px; /* space between bullet and text */
        }

        /* Improved image styling */
        img {
            border: 5px solid blue;
            border-radius: 10px;
        }

        /* CSS grid layout for photo album */
        .photo-album {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        /* Enhanced footer styling */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #f1f1f1;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1>Hello!</h1>
        <div class="hello-box-animation">
            <!-- Animation code remains unchanged -->
        </div>
        <ul class="tabs">
            <li>Home</li>
            <li>About</li>
            <li>Projects</li>
        </ul>
        <div class="photo-album">
            <img src="path/to/photo1.jpg" alt="Photo 1">
            <img src="path/to/photo2.jpg" alt="Photo 2">
            <img src="path/to/photo3.jpg" alt="Photo 3">
        </div>
    </div>
    <footer>
        <p>© 2026 JeisonAmorocho</p>
    </footer>
</body>
</html>
